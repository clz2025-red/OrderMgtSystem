<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 주문 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f2f6ff;
            --bg-2: #fff1ea;
            --ink: #1f2937;
            --brand: #0e7490;
            --brand-strong: #155e75;
            --accent: #ea580c;
            --card: rgba(255, 255, 255, 0.86);
            --line: rgba(14, 116, 144, 0.24);
            --shadow: 0 20px 40px rgba(14, 116, 144, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans KR", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 12% 10%, rgba(14, 116, 144, 0.2), transparent 35%),
                        radial-gradient(circle at 85% 90%, rgba(234, 88, 12, 0.22), transparent 42%),
                        linear-gradient(145deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .page {
            width: min(980px, 100%);
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: var(--shadow);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(8px);
            animation: rise-in 600ms ease-out;
        }

        .header {
            padding: 28px 30px 18px;
            border-bottom: 1px solid var(--line);
        }

        .header h1 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(1.5rem, 1.6vw + 1rem, 2.2rem);
            letter-spacing: 0.02em;
        }

        .header p {
            margin: 8px 0 0;
            opacity: 0.86;
        }

        .table-wrap {
            overflow-x: auto;
            padding: 14px 18px 22px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid rgba(31, 41, 55, 0.08);
        }

        th {
            font-size: 0.9rem;
            color: #0f172a;
            opacity: 0.9;
        }

        tbody tr {
            transition: background-color 160ms ease;
        }

        tbody tr:hover {
            background: rgba(14, 116, 144, 0.08);
        }

        .money {
            font-weight: 700;
            color: var(--brand-strong);
        }

        .qty {
            width: 86px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.2);
            font: inherit;
            outline: none;
        }

        .qty:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(14, 116, 144, 0.15);
        }

        .order-btn {
            border: none;
            border-radius: 999px;
            padding: 10px 16px;
            font: inherit;
            font-weight: 700;
            color: white;
            background: linear-gradient(100deg, var(--brand), var(--accent));
            cursor: pointer;
            transition: transform 120ms ease, filter 120ms ease;
        }

        .order-btn:hover {
            transform: translateY(-1px);
            filter: saturate(1.2);
        }

        .order-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .empty {
            margin: 24px;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.72);
            border: 1px dashed rgba(15, 23, 42, 0.2);
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 780px) {
            .page {
                border-radius: 18px;
            }

            .header {
                padding: 22px 20px 14px;
            }

            .table-wrap {
                padding: 10px 12px 16px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="header">
        <h1>상품 목록 및 주문</h1>
        <p>원하는 상품의 수량을 입력하고 주문하기 버튼을 눌러 실제 API 호출을 확인하세요.</p>
    </header>

    <section th:if="${#lists.isEmpty(products)}" class="empty">
        등록된 상품이 없습니다. 데이터베이스에 상품/재고를 추가한 뒤 다시 확인해주세요.
    </section>

    <section th:unless="${#lists.isEmpty(products)}" class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>상품 ID</th>
                <th>상품명</th>
                <th>가격</th>
                <th>재고</th>
                <th>수량</th>
                <th>주문</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.productId}">1</td>
                <td th:text="${product.productName}">샘플 상품</td>
                <td class="money" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + '원'">10,000.00원</td>
                <td th:text="${product.stockQuantity}">10</td>
                <td>
                    <label>
                        <input class="qty"
                               type="number"
                               min="1"
                               value="1"
                               th:id="${'qty-' + product.productId}">
                    </label>
                </td>
                <td>
                    <button class="order-btn"
                            type="button"
                            th:attr="data-product-id=${product.productId},data-qty-input-id=${'qty-' + product.productId}">
                        주문하기
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>

<script>
    async function parseResponseBody(response) {
        const text = await response.text();
        if (!text) {
            return null;
        }
        try {
            return JSON.parse(text);
        } catch (error) {
            return null;
        }
    }

    document.querySelectorAll('.order-btn').forEach((button) => {
        button.addEventListener('click', async () => {
            const productId = Number(button.dataset.productId);
            const qtyInput = document.getElementById(button.dataset.qtyInputId);
            const quantity = Number(qtyInput?.value ?? 0);

            if (!Number.isInteger(quantity) || quantity < 1) {
                alert('수량은 1 이상의 정수여야 합니다.');
                return;
            }

            button.disabled = true;
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ productId, quantity })
                });

                const payload = await parseResponseBody(response);

                if (response.ok) {
                    const orderId = payload?.orderId ?? '-';
                    alert('주문 성공: 주문번호 ' + orderId);
                    return;
                }

                const errorMessage = payload?.message || ('주문 실패: HTTP ' + response.status);
                alert(errorMessage);
            } catch (error) {
                alert('네트워크 오류로 주문 요청에 실패했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                button.disabled = false;
            }
        });
    });
</script>
</body>
</html>
